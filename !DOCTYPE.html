<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
  <title>Something for You</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Lato:wght@300;400&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: Lato, sans-serif;
      overflow: hidden;
    }

    canvas#c {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    /* ── INTRO ── */
    #intro {
      position: fixed;
      inset: 0;
      z-index: 50;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
      cursor: pointer;
    }

    .lyric-line {
      font-family: "Dancing Script", cursive;
      font-size: clamp(1.8rem, 7vw, 3rem);
      color: #fff;
      line-height: 1.6;
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 1.2s ease, transform 1.2s ease;
      text-shadow: 0 0 50px rgba(220,80,120,.6);
      margin-bottom: 4px;
    }
    .lyric-line.show { opacity: 1; transform: translateY(0); }
    .lyric-line.hide {
      opacity: 0;
      transform: translateY(-24px);
      transition: opacity .5s ease, transform .5s ease;
    }

    .lyric-word {
      display: inline-block;
      opacity: 0;
      transform: translateY(18px) scale(.96);
      transition: opacity .7s ease, transform .7s ease;
      margin: 0 .12em;
    }
    .lyric-word.show {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
    .lyric-word.fade {
      opacity: .48;
      transform: translateY(-4px) scale(.99);
    }

    .tap-hint {
      margin-top: 44px;
      font-size: .68rem;
      letter-spacing: .24em;
      text-transform: uppercase;
      color: #5a2535;
      opacity: 0;
      transition: opacity .8s;
      animation: blink 2.2s ease-in-out infinite;
    }
    .tap-hint.show { opacity: 1; }
    @keyframes blink { 0%,100% { opacity: .9 } 50% { opacity: .2 } }

    /* ── MAIN CONTENT ── */
    .content {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      padding: 20px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 1s ease;
    }
    .content.show { opacity: 1; }

    .text-block {
      text-align: center;
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 1.2s ease, transform 1.2s ease;
    }
    .text-block.visible { opacity: 1; transform: translateY(0); }

    .eyebrow {
      font-size: .65rem;
      letter-spacing: .28em;
      text-transform: uppercase;
      color: #c2647a;
      margin-bottom: 10px;
    }

    h1 {
      font-family: "Dancing Script", cursive;
      font-size: clamp(1.8rem, 7vw, 2.8rem);
      color: #fff;
      line-height: 1.2;
      text-shadow: 0 0 40px rgba(220,80,120,.6), 0 0 80px rgba(220,80,120,.3);
      margin-bottom: 28px;
    }

    /* ── BUTTONS ── */
    .btn-group {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      pointer-events: all;
    }

    .btn {
      border: none;
      border-radius: 50px;
      padding: 14px 38px;
      font-size: 1.05rem;
      font-family: "Dancing Script", cursive;
      font-weight: 700;
      cursor: pointer;
      outline: 0;
      transition: all .2s ease;
    }

    .btn-yes {
      background: linear-gradient(135deg, #e8445a, #9b1c3a);
      color: #fff;
      box-shadow: 0 0 24px rgba(232,68,90,.5), 0 0 60px rgba(232,68,90,.2);
      animation: yesPulse 2s ease-in-out infinite;
      min-width: 130px;
    }
    @keyframes yesPulse {
      0%,100% { box-shadow: 0 0 24px rgba(232,68,90,.5), 0 0 60px rgba(232,68,90,.2); }
      50%      { box-shadow: 0 0 40px rgba(232,68,90,.8), 0 0 90px rgba(232,68,90,.4); }
    }
    .btn-yes:active { transform: scale(.96); }

    .btn-no {
      background: rgba(255,255,255,.07);
      color: #776070;
      border: 1px solid rgba(255,255,255,.1);
      min-width: 110px;
      transform: translate(var(--no-x, 0), var(--no-y, 0)) rotate(var(--no-r, 0deg));
      transition: transform .28s cubic-bezier(.2, 1.4, .4, 1), background .2s ease, color .2s ease, box-shadow .2s ease, border .2s ease;
      will-change: transform;
    }
    .btn-no.fleeing {
      background: rgba(255,255,255,.1);
      color: #a98391;
      box-shadow: 0 10px 30px rgba(0,0,0,.26);
    }
    .btn-no.transformed-to-yes {
      background: linear-gradient(135deg, #e8445a, #9b1c3a) !important;
      color: #fff !important;
      box-shadow: 0 0 24px rgba(232,68,90,.5) !important;
      border: none !important;
      transform: translate(0, 0) rotate(0deg) scale(1.04);
    }

    .no-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      pointer-events: all;
    }

    .no-warning {
      font-size: .58rem;
      letter-spacing: .06em;
      color: #7a4a58;
      font-style: italic;
      pointer-events: none;
      animation: warnFlicker 3s ease-in-out infinite;
    }
    @keyframes warnFlicker { 0%,100% { opacity: .85 } 50% { opacity: .25 } }

    /* ── MUSIC BAR ── */
    .music-bar {
      pointer-events: all;
      margin-top: 28px;
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,.05);
      border-radius: 20px;
      padding: 10px 18px;
      cursor: pointer;
      border: 1px solid rgba(220,80,120,.2);
      backdrop-filter: blur(8px);
      transition: background .2s;
    }
    .music-bar:hover { background: rgba(220,80,120,.12); }

    .music-disc {
      font-size: 1.3rem;
      display: inline-block;
      animation: spin 3s linear infinite paused;
    }
    .music-disc.playing { animation-play-state: running; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .music-info { text-align: left; flex: 1; }
    .music-title  { font-size: .74rem; color: #e0b0c0; }
    .music-artist { font-size: .63rem; color: #7a5060; font-weight: 300; }

    .mbars { display: flex; align-items: flex-end; gap: 2px; height: 16px; }
    .mbars span {
      display: block;
      width: 3px;
      border-radius: 2px;
      background: #e8445a;
      animation: bj .7s ease-in-out infinite paused;
    }
    .mbars.on span { animation-play-state: running; }
    .mbars span:nth-child(1) { height: 6px;  animation-delay: 0s; }
    .mbars span:nth-child(2) { height: 13px; animation-delay: .12s; }
    .mbars span:nth-child(3) { height: 9px;  animation-delay: .24s; }
    .mbars span:nth-child(4) { height: 15px; animation-delay: .08s; }
    .mbars span:nth-child(5) { height: 5px;  animation-delay: .2s; }
    @keyframes bj { 0%,100% { transform: scaleY(1) } 50% { transform: scaleY(.25) } }

    /* ── CELEBRATE ── */
    #celebrate {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: #000;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      padding: 40px;
      animation: fadeIn .6s ease;
    }
    @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }

    #celebrate canvas { position: fixed; inset: 0; z-index: 0; }

    .cel-content { position: relative; z-index: 10; }

    #celebrate h2 {
      font-family: "Dancing Script", cursive;
      font-size: clamp(2.4rem, 9vw, 4rem);
      color: #fff;
      text-shadow: 0 0 40px rgba(220,80,120,.9), 0 0 100px rgba(220,80,120,.4);
      margin: 16px 0 12px;
    }

    #celebrate p {
      font-size: .95rem;
      color: #c090a0;
      font-weight: 300;
      line-height: 1.8;
      max-width: 280px;
    }

    .big-heart {
      font-size: 4.5rem;
      animation: hb 1.1s ease-in-out infinite;
      display: inline-block;
    }
    @keyframes hb {
      0%,100% { transform: scale(1) }
      40%      { transform: scale(1.2) }
      60%      { transform: scale(1.08) }
    }
  </style>
</head>
<body>

<!-- ── INTRO SCREEN ── -->
<div id="intro" onclick="startExperience()">
  <div id="lyricBox">
    <div class="lyric-line" id="l1">
      <span class="lyric-word" data-delay="700">At</span>
      <span class="lyric-word" data-delay="980">least</span>
      <span class="lyric-word" data-delay="1380">as</span>
      <span class="lyric-word" data-delay="1680">deep</span>
      <span class="lyric-word" data-delay="2180">as</span>
    </div>
    <div class="lyric-line" id="l2">
      <span class="lyric-word" data-delay="2860">the</span>
      <span class="lyric-word" data-delay="3320">Pacific</span>
      <span class="lyric-word" data-delay="4200">Ocean</span>
    </div>
  </div>
  <p class="tap-hint show" id="tapHint">click anywhere to continue</p>
</div>

<!-- ── PARTICLE HEART CANVAS ── -->
<canvas id="c"></canvas>

<!-- ── MAIN CONTENT ── -->
<div class="content" id="mainContent">
  <div style="height:50vmin;max-height:260px;"></div>
  <div class="text-block" id="textBlock">
    <p class="eyebrow">a message for you</p>
    <h1 id="mainTitle">Do you wanna be my Girlfriend?</h1>

    <div class="btn-group" id="btnGroup">
      <button class="btn btn-yes" id="yesBtn" onclick="sayYes()">Yes</button>
      <div class="no-wrap">
        <span class="no-warning" id="noWarning">do not click here, seriously</span>
        <button class="btn btn-no" id="noBtn">No</button>
      </div>
    </div>

    <div class="music-bar" onclick="toggleMusic()">
      <span class="music-disc" id="disc">💿</span>
      <div class="music-info">
        <div class="music-title">I Wanna Be Yours</div>
        <div class="music-artist">Arctic Monkeys</div>
      </div>
      <div class="mbars" id="mbars">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
    </div>
  </div>
</div>

<!-- ── CELEBRATION SCREEN ── -->
<div id="celebrate">
  <canvas id="cc"></canvas>
  <div class="cel-content">
    <div class="big-heart">💗</div>
    <h2>She Said Yes</h2>
    <p>You just made me the happiest person in the world.<br>This is only the beginning of our story.</p>
  </div>
</div>

<!-- ── AUDIO ── -->
<audio id="song" loop preload="auto">
  <source src="wanna-be-yours.mp3" type="audio/mpeg">
</audio>

<script>

/\* ── STATE ── \*/

const song = document.getElementById("song");

let experienceStarted = false;

let fadeTimer = null;



/\* ── INTRO → MAIN ── \*/

function startExperience() {

&#x20; if (experienceStarted) return;

&#x20; experienceStarted = true;



&#x20; document.getElementById("tapHint").classList.remove("show");



&#x20; song.currentTime = 95;

&#x20; song.volume = 0;

&#x20; song.play().catch(e => console.log("Audio playback failed:", e));

&#x20; fadeInSong();

&#x20; document.getElementById("disc").classList.add("playing");

&#x20; document.getElementById("mbars").classList.add("on");



&#x20; document.getElementById("l1").classList.add("show");

&#x20; document.getElementById("l2").classList.add("show");

&#x20; document.querySelectorAll(".lyric-word").forEach(word => {

&#x20;   const delay = Number(word.dataset.delay || 0);

&#x20;   setTimeout(() => { word.classList.add("show"); }, delay);

&#x20;   setTimeout(() => { word.classList.add("fade"); }, delay + 1150);

&#x20; });



&#x20; setTimeout(() => {

&#x20;   document.getElementById("l1").classList.add("hide");

&#x20;   document.getElementById("l2").classList.add("hide");

&#x20; }, 5600);



&#x20; setTimeout(() => {

&#x20;   const intro = document.getElementById("intro");

&#x20;   intro.style.transition = "opacity 1s ease";

&#x20;   intro.style.opacity = "0";

&#x20;   setTimeout(() => { intro.style.display = "none"; }, 1000);

&#x20; }, 6200);



&#x20; setTimeout(() => {

&#x20;   initHeartAnimation();



&#x20;   const content   = document.getElementById("mainContent");

&#x20;   const textBlock = document.getElementById("textBlock");

&#x20;   content.classList.add("show");

&#x20;   setTimeout(() => { textBlock.classList.add("visible"); }, 200);

&#x20; }, 7000);

}



/\* ── MUSIC TOGGLE ── \*/

function fadeInSong(targetVolume = 1, duration = 3200) {

&#x20; clearInterval(fadeTimer);



&#x20; const startVolume = song.volume;

&#x20; const startedAt = performance.now();



&#x20; fadeTimer = setInterval(() => {

&#x20;   const progress = Math.min((performance.now() - startedAt) / duration, 1);

&#x20;   song.volume = startVolume + (targetVolume - startVolume) \* progress;



&#x20;   if (progress >= 1) clearInterval(fadeTimer);

&#x20; }, 50);

}



function toggleMusic() {

&#x20; const disc  = document.getElementById("disc");

&#x20; const mbars = document.getElementById("mbars");

&#x20; if (song.paused) {

&#x20;   song.volume = Math.min(song.volume, 0.12);

&#x20;   song.play();

&#x20;   fadeInSong();

&#x20;   disc.classList.add("playing");

&#x20;   mbars.classList.add("on");

&#x20; } else {

&#x20;   clearInterval(fadeTimer);

&#x20;   song.pause();

&#x20;   disc.classList.remove("playing");

&#x20;   mbars.classList.remove("on");

&#x20; }

}



/\* ── NO → YES TRICK ── \*/

const noBtn = document.getElementById("noBtn");

let noAttempts = 0;

let noIsYes = false;



function turnNoIntoYes() {

&#x20; noIsYes = true;

&#x20; noBtn.textContent = "Yes";

&#x20; noBtn.style.setProperty("--no-x", "0px");

&#x20; noBtn.style.setProperty("--no-y", "0px");

&#x20; noBtn.style.setProperty("--no-r", "0deg");

&#x20; noBtn.classList.remove("fleeing");

&#x20; noBtn.classList.add("transformed-to-yes");

&#x20; noBtn.onclick = sayYes;

}



function makeNoRunAway(event) {

&#x20; if (noIsYes) return;

&#x20; if (event.type === "touchstart") event.preventDefault();



&#x20; noAttempts += 1;



&#x20; if (noAttempts >= 3) {

&#x20;   turnNoIntoYes();

&#x20;   return;

&#x20; }



&#x20; const direction = noAttempts % 2 === 0 ? -1 : 1;

&#x20; const runDistance = Math.min(108, Math.max(58, window.innerWidth \* 0.24));

&#x20; const x = direction \* (runDistance + Math.random() \* 14);

&#x20; const y = (Math.random() \* 46 - 23);

&#x20; const r = direction \* (8 + Math.random() \* 7);



&#x20; noBtn.classList.add("fleeing");

&#x20; noBtn.style.setProperty("--no-x", `${x}px`);

&#x20; noBtn.style.setProperty("--no-y", `${y}px`);

&#x20; noBtn.style.setProperty("--no-r", `${r}deg`);

&#x20; noBtn.textContent = noAttempts === 1 ? "Nope" : "Almost";

}



noBtn.addEventListener("mouseenter", makeNoRunAway);

noBtn.addEventListener("click", makeNoRunAway);

noBtn.addEventListener("touchstart", makeNoRunAway);



/\* ── YES ── \*/

function sayYes() {

&#x20; document.getElementById("celebrate").style.display = "flex";

&#x20; celebrationRain();

}



/\* ═══════════════════════════════════════════════

&#x20;  HEART PARTICLE ANIMATION (main canvas #c)

═══════════════════════════════════════════════ \*/

let heartAnimActive = false;



function initHeartAnimation() {

&#x20; if (heartAnimActive) return;

&#x20; heartAnimActive = true;



&#x20; const canvas = document.getElementById("c");

&#x20; const ctx    = canvas.getContext("2d");



&#x20; canvas.width  = window.innerWidth;

&#x20; canvas.height = window.innerHeight;



&#x20; window.addEventListener("resize", () => {

&#x20;   canvas.width  = window.innerWidth;

&#x20;   canvas.height = window.innerHeight;

&#x20; });



&#x20; const particles = \[];



&#x20; class Particle {

&#x20;   constructor() {

&#x20;     this.angle   = Math.random() \* Math.PI \* 2;

&#x20;     const sin3   = Math.pow(Math.sin(this.angle), 3);

&#x20;     this.targetX = 16 \* sin3;

&#x20;     this.targetY = -(

&#x20;       13 \* Math.cos(this.angle)

&#x20;       - 5  \* Math.cos(2 \* this.angle)

&#x20;       - 2  \* Math.cos(3 \* this.angle)

&#x20;       -      Math.cos(4 \* this.angle)

&#x20;     );

&#x20;     this.scale   = Math.min(canvas.width, canvas.height) \* 0.022;

&#x20;     this.targetX \*= this.scale;

&#x20;     this.targetY \*= this.scale;



&#x20;     this.x     = Math.random() \* canvas.width;

&#x20;     this.y     = Math.random() \* canvas.height;

&#x20;     this.size  = Math.random() \* 2 + 1;

&#x20;     this.speed = Math.random() \* 0.02 + 0.01;

&#x20;     this.color = `hsl(${20 \* Math.random() + 340},100%,${25 \* Math.random() + 55}%)`;

&#x20;   }



&#x20;   update(t) {

&#x20;     const pulse = 1 + 0.06 \* Math.sin(0.004 \* t);

&#x20;     const tx = this.targetX \* pulse + canvas.width  / 2;

&#x20;     const ty = this.targetY \* pulse + canvas.height / 2 - 40;

&#x20;     this.x += (tx - this.x) \* this.speed;

&#x20;     this.y += (ty - this.y) \* this.speed;

&#x20;   }



&#x20;   draw() {

&#x20;     ctx.beginPath();

&#x20;     ctx.arc(this.x, this.y, this.size, 0, 2 \* Math.PI);

&#x20;     ctx.fillStyle   = this.color;

&#x20;     ctx.shadowBlur  = 10;

&#x20;     ctx.shadowColor = this.color;

&#x20;     ctx.fill();

&#x20;   }

&#x20; }



&#x20; for (let i = 0; i < 650; i++) particles.push(new Particle());



&#x20; function animate(t) {

&#x20;   ctx.clearRect(0, 0, canvas.width, canvas.height);

&#x20;   ctx.fillStyle = "rgba(0,0,0,0.18)";

&#x20;   ctx.fillRect(0, 0, canvas.width, canvas.height);



&#x20;   for (const p of particles) {

&#x20;     p.update(t);

&#x20;     p.draw();

&#x20;   }

&#x20;   requestAnimationFrame(animate);

&#x20; }



&#x20; requestAnimationFrame(animate);

}



/\* ═══════════════════════════════════════════════

&#x20;  CELEBRATION CONFETTI (canvas #cc)

═══════════════════════════════════════════════ \*/

function celebrationRain() {

&#x20; const canvas = document.getElementById("cc");

&#x20; const ctx    = canvas.getContext("2d");



&#x20; canvas.width  = window.innerWidth;

&#x20; canvas.height = window.innerHeight;



&#x20; const EMOJIS   = \["💗","💕","✨","🌸","💖","🌹","💓","🥰"];

&#x20; const PIECES   = \[];

&#x20; const COUNT    = 60;



&#x20; for (let i = 0; i < COUNT; i++) {

&#x20;   PIECES.push({

&#x20;     x:     Math.random() \* canvas.width,

&#x20;     y:     -40 - Math.random() \* canvas.height,

&#x20;     emoji: EMOJIS\[Math.floor(Math.random() \* EMOJIS.length)],

&#x20;     size:  Math.random() \* 22 + 14,

&#x20;     speed: Math.random() \* 2.5 + 1,

&#x20;     sway:  Math.random() \* 1.2 - 0.6,

&#x20;     rot:   Math.random() \* Math.PI \* 2,

&#x20;     rotV:  (Math.random() - 0.5) \* 0.04,

&#x20;   });

&#x20; }



&#x20; function draw() {

&#x20;   ctx.clearRect(0, 0, canvas.width, canvas.height);

&#x20;   let alive = false;



&#x20;   for (const p of PIECES) {

&#x20;     p.y   += p.speed;

&#x20;     p.x   += p.sway;

&#x20;     p.rot += p.rotV;

&#x20;     if (p.y < canvas.height + 60) alive = true;



&#x20;     ctx.save();

&#x20;     ctx.translate(p.x, p.y);

&#x20;     ctx.rotate(p.rot);

&#x20;     ctx.font      = p.size + "px serif";

&#x20;     ctx.textAlign = "center";

&#x20;     ctx.textBaseline = "middle";

&#x20;     ctx.fillText(p.emoji, 0, 0);

&#x20;     ctx.restore();

&#x20;   }



&#x20;   if (alive) requestAnimationFrame(draw);

&#x20; }



&#x20; requestAnimationFrame(draw);

}

</body>
</html>
